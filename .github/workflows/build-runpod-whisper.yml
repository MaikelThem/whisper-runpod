# Build + push imagen Whisper custom para RunPod → GitHub Container Registry
# Repo → Actions → "Build RunPod Whisper Image" → Run workflow
#
# Imagen resultante (pública):
#   ghcr.io/maikelthem/whisper-runpod:latest

name: Build RunPod Whisper Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la imagen (además de latest)'
        required: false
        default: 'latest'
  push:
    paths:
      - 'runpod/**'
      - '.github/workflows/build-runpod-whisper.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/whisper-runpod

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: meta
        run: echo "image=${REGISTRY}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod
          file: ./runpod/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ inputs.tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
